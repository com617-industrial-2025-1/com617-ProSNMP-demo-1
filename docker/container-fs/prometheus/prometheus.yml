global:
  scrape_interval: 15s 
  evaluation_interval: 15s 

alerting:
  alertmanagers:
    - static_configs:
        - targets:

rule_files:
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "PromSNMP"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["promsnmp:8080"]

  - job_name: 'snmp'
    metrics_path: /snmp
    scrape_interval: 30s
    scrape_timeout: 30s
    http_sd_configs:
      - url: http://promsnmp:8080/targets
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: promsnmp:8080
